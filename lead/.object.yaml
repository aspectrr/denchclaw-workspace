name: lead
icon: Target
description: Prospective customers from Reddit and other sources
default_view: table
entry_count: 28
fields:
  - name: Title
    type: text
    sort_order: 1
    required: true
  - name: URL
    type: url
    sort_order: 2
  - name: Description
    type: richtext
    sort_order: 3
  - name: Posted Date
    type: date
    sort_order: 4
  - name: Source
    type: text
    sort_order: 5
  - name: Subreddit
    type: text
    sort_order: 6
  - name: Status
    type: enum
    sort_order: 7
    enum_values:
      - New
      - Contacted
      - Responded
      - Qualified
      - Closed
    enum_colors:
      - '#94a3b8'
      - '#3b82f6'
      - '#f59e0b'
      - '#22c55e'
      - '#64748b'
  - name: Priority
    type: enum
    sort_order: 8
    enum_values:
      - Low
      - Medium
      - High
      - Critical
    enum_colors:
      - '#22c55e'
      - '#3b82f6'
      - '#f59e0b'
      - '#ef4444'
  - name: Lead Age
    type: enum
    sort_order: 9
    enum_values:
      - Fresh (<30 days)
      - Warm (30-90 days)
      - Cold (>90 days)
    enum_colors:
      - '#22c55e'
      - '#3b82f6'
      - '#94a3b8'
  - name: Reddit Username
    type: text
    sort_order: 10
  - name: LinkedIn URL
    type: url
    sort_order: 11
  - name: GitHub URL
    type: url
    sort_order: 12
  - name: ICP Fit
    type: enum
    sort_order: 13
    enum_values:
      - Fit - Ideal
      - Fit - Good
      - Maybe
      - Out - Job Seeker
      - Out - Competitor
      - Out - Consultant
      - Out - IT Services
      - Unknown
    enum_colors:
      - '#22c55e'
      - '#84cc16'
      - '#f59e0b'
      - '#ef4444'
      - '#ef4444'
      - '#ef4444'
      - '#ef4444'
      - '#94a3b8'
  - name: Connection Status
    type: enum
    sort_order: 14
    enum_values:
      - Not Connected
      - Pending
      - Connected
      - Rejected
    enum_colors:
      - '#94a3b8'
      - '#f59e0b'
      - '#22c55e'
      - '#ef4444'
  - name: Connection Quality
    type: enum
    sort_order: 15
    enum_values:
      - Unrated
      - Great Fit
      - Good Fit
      - OK Fit
      - Bad Fit
      - Not ICP
    enum_colors:
      - '#94a3b8'
      - '#22c55e'
      - '#84cc16'
      - '#f59e0b'
      - '#ef4444'
      - '#ef4444'
  - name: Feedback Notes
    type: richtext
    sort_order: 16
views:
  - name: Recent First
    type: table
    filter:
      field: Posted Date
      operator: is_not_empty
    sort:
      field: Posted Date
      direction: desc
